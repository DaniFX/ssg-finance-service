name: Deploy Finance Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-finance-service
    secrets: inherit
    # Secrets necessari nel repo:
    #   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
    #   GCP_PROJECT_ID, GATEWAY_URL, DOCUMENT_SERVICE_URL
    #   GCP_RUNTIME_SERVICE_ACCOUNT (SA del servizio)
