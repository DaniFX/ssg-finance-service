name: Deploy Finance Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-finance-service
      # GCP_RUNTIME_SERVICE_ACCOUNT passato via secrets: inherit
      # Aggiungi il secret nel repo con nome GCP_RUNTIME_SERVICE_ACCOUNT
      # e valore: finance-runtime-sa@ssg-api-99ac0.iam.gserviceaccount.com
      env_vars: |
        ENV=production
        GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
        GATEWAY_URL=${{ secrets.GATEWAY_URL }}
        DOCUMENT_SERVICE_URL=${{ secrets.DOCUMENT_SERVICE_URL }}
    secrets: inherit
