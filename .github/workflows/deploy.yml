name: Deploy Finance Service to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permette di far partire il deploy anche manualmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Fondamentale per la Workload Identity Federation

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Usiamo gli stessi secrets standard del progetto
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ssg-finance-service
          region: europe-west8          # Milano
          source: .                     # GCP farà la build Docker dal nostro Dockerfile
          flags: |
            --port=8080
            --ingress=internal-and-cloud-load-balancing
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_FINANCE_SERVICE }}
          env_vars: |
            ENV=production
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GATEWAY_URL=${{ secrets.GATEWAY_URL }}
            DOCUMENT_SERVICE_URL=${{ secrets.DOCUMENT_SERVICE_URL }}